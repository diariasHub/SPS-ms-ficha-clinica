spring.application.name=ms-ficha-clinica
server.port=8001

pring.cloud.compatibility-verifier.enabled=false

# ===============================
# PERFIL ACTIVO
# ===============================
spring.profiles.active=dev

# ===============================
# ENCODING
# ===============================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# ===============================
# TIMEZONE
# ===============================
spring.jackson.time-zone=America/Santiago

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# BASE DE DATOS - MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/bd_rednorte?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Estrategias de nombres (respeta @Column exacto)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ===============================
# INTEGRACION - BDSISPRO
# ===============================
integration.bdsispro.url=http://localhost:8001

# SWAGGER / OPENAPI
# http://localhost:8020/swagger-ui/index.html